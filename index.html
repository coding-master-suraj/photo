<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Studio One - Zoom, Pan & Auto-Lock</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .upload-zone:hover:not(.disabled-zone) {
            border-color: #818cf8;
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.2);
        }
        .disabled-zone {
            opacity: 0.5;
            cursor: not-allowed !important;
            border-color: rgba(244, 63, 94, 0.4) !important;
        }
    </style>
</head>
<body class="text-slate-200 font-sans antialiased p-4 md:p-6">

    <div class="max-w-xl mx-auto space-y-6">
        
        <header class="text-center py-2 relative">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-pink-400 bg-clip-text text-transparent">
                Drive Studio One
            </h1>
            <p class="text-slate-400 mt-1 text-xs">Synchronized Google Drive controller with direct storage access.</p>
            
            <button id="loginModalBtn" class="absolute right-0 top-2 bg-slate-900/60 hover:bg-slate-800 text-xs px-2.5 py-1.5 rounded-lg border border-slate-700 transition-all flex items-center gap-1.5 text-rose-400">
                <i id="lockIcon" class="fa-solid fa-lock"></i> <span id="lockStatusText">Locked</span>
            </button>
        </header>

        <div id="loginPanel" class="glass-card rounded-2xl p-4 shadow-xl border border-indigo-500/20 space-y-3">
            <div class="flex justify-between items-center">
                <label class="block text-xs font-semibold uppercase tracking-wider text-indigo-400">
                    <i class="fa-solid fa-key mr-1"></i> Admin Authentication
                </label>
            </div>
            <div class="flex gap-2">
                <input type="password" id="passcodeInput" placeholder="Enter password (default: mySecret123)..." class="w-full bg-slate-950/60 border border-slate-700 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-100">
                <button id="loginBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 py-2 rounded-xl transition-colors">
                    Verify
                </button>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-5 shadow-2xl space-y-6">
            
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-indigo-400 mb-2">
                    <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Send to Google Drive
                </label>
                
                <div id="dropZone" class="upload-zone disabled-zone border-2 border-dashed border-slate-700 rounded-xl p-6 text-center cursor-not-allowed transition-all duration-300 bg-slate-900/50">
                    <input type="file" id="fileInput" multiple accept="image/*" class="hidden" disabled>
                    <div id="dropZoneContent" class="space-y-2">
                        <div class="text-2xl text-rose-500"><i class="fa-solid fa-lock"></i></div>
                        <p class="text-xs font-medium text-rose-400">Authorization Required</p>
                    </div>
                </div>

                <div id="uploadStatus" class="mt-4 hidden space-y-2 bg-slate-950/60 p-3 rounded-xl border border-slate-800">
                    <div class="flex justify-between items-center text-xs">
                        <span id="statusText" class="font-medium text-indigo-300">Initializing...</span>
                        <span id="percentText" class="font-bold text-pink-400 text-sm">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full w-0 bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <div class="border-t border-slate-800/80 my-2 flex items-center justify-between pt-4">
                <span class="text-xs font-semibold uppercase tracking-wider text-pink-400">
                    <i class="fa-solid fa-photo-film mr-1"></i> Live Drive Images
                </span>
                <button id="refreshBtn" class="text-[11px] text-indigo-400 hover:text-indigo-300 bg-indigo-500/10 px-2.5 py-1 rounded-md transition-all">
                    <i class="fa-solid fa-rotate mr-1"></i> Sync Gallery
                </button>
            </div>

            <div>
                <div id="emptyState" class="py-8 text-center bg-slate-950/20 rounded-xl border border-dashed border-slate-800">
                    <i class="fa-solid fa-circle-notch fa-spin text-lg text-indigo-400 mb-1"></i>
                    <p class="text-xs text-slate-400">Fetching photos...</p>
                </div>
                <div id="galleryGrid" class="grid grid-cols-3 gap-2"></div>
            </div>

        </div>
    </div>

    <div id="lightbox" class="fixed inset-0 bg-black/95 z-50 hidden opacity-0 transition-opacity duration-300 flex flex-col justify-between p-4 selection:bg-transparent">
        <div class="flex justify-between items-center w-full max-w-2xl mx-auto py-1">
            <span id="lightboxIndex" class="text-xs font-medium text-indigo-400 uppercase tracking-widest"><i class="fa-solid fa-arrows-to-eye mr-1"></i> View Mode (Drag to Move)</span>
            <button id="closeLightbox" class="w-8 h-8 bg-slate-900 border border-slate-800 text-white rounded-full flex items-center justify-center text-sm cursor-pointer hover:bg-slate-800">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div id="imgContainer" class="relative flex items-center justify-center flex-1 max-w-2xl mx-auto w-full overflow-hidden rounded-xl border border-slate-900 bg-slate-950/40 cursor-grab active:cursor-grabbing">
            <img id="lightboxImg" src="" alt="Preview" class="max-h-[70vh] max-w-full object-contain rounded-lg transition-transform duration-100 ease-out origin-center select-none pointer-events-none">
        </div>
        
        <div class="w-full max-w-xs mx-auto py-4 flex flex-col items-center gap-2">
            <div class="flex items-center justify-between w-full text-[10px] uppercase font-bold tracking-wider text-slate-400 px-1">
                <span>Zoom Out</span>
                <span id="zoomValue" class="text-indigo-400">100%</span>
                <span>Zoom In</span>
            </div>
            <div class="flex items-center gap-3 w-full bg-slate-900/80 px-4 py-2.5 rounded-full border border-slate-800">
                <i class="fa-solid fa-minus text-xs text-slate-500"></i>
                <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500 focus:outline-none">
                <i class="fa-solid fa-plus text-xs text-indigo-400"></i>
            </div>
        </div>
    </div>

    <script>
       // Apnar dynamic Google Apps Script URL-ti nicher duti variable-e bosiye din
        const VIEW_API = "https://script.google.com/macros/s/AKfycbzbqnaQhYfQHpyh4ezMWkPbNtRKAdcY2gLwBu7wI1yiaPXB5suXf55Wcr5g611squCl/exec";
        const UPLOAD_API = "https://script.google.com/macros/s/AKfycbzbqnaQhYfQHpyh4ezMWkPbNtRKAdcY2gLwBu7wI1yiaPXB5suXf55Wcr5g611squCl/exec";

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const galleryGrid = document.getElementById('galleryGrid');
        const emptyState = document.getElementById('emptyState');
        const refreshBtn = document.getElementById('refreshBtn');
        const uploadStatus = document.getElementById('uploadStatus');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const percentText = document.getElementById('percentText');
        const dropZoneContent = document.getElementById('dropZoneContent');
        
        const loginPanel = document.getElementById('loginPanel');
        const passcodeInp = document.getElementById('passcodeInput');
        const loginBtn = document.getElementById('loginBtn');
        const lockIcon = document.getElementById('lockIcon');
        const lockStatusText = document.getElementById('lockStatusText');
        const loginModalBtn = document.getElementById('loginModalBtn');

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const closeLightbox = document.getElementById('closeLightbox');
        const imgContainer = document.getElementById('imgContainer');
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');

        let fetchedImages = [];
        let isUploading = false; 
        let userToken = ""; 
        let activeIndex = 0;
        let isAuthorized = false;

        // PAN VARIABLES
        let isDragging = false;
        let startX, startY;
        let translateX = 0, translateY = 0;
        let currentScale = 1;

        window.addEventListener('DOMContentLoaded', fetchGallery);
        refreshBtn.addEventListener('click', () => { if(!isUploading) fetchGallery(); });

        // AUTHORIZED CLICK CONTROLLER
        loginModalBtn.addEventListener('click', () => {
            if (isAuthorized) {
                // If already authorized, clicking it will reload the page to lock again
                window.location.reload();
            } else {
                loginPanel.classList.toggle('hidden');
            }
        });

        loginBtn.addEventListener('click', () => {
            const val = passcodeInp.value.trim();
            if(val === "") return;

            userToken = val; 
            isAuthorized = true;
            loginPanel.classList.add('hidden');
            loginModalBtn.className = "absolute right-0 top-2 bg-slate-900/60 hover:bg-slate-800 text-xs px-2.5 py-1.5 rounded-lg border border-slate-700 transition-all flex items-center gap-1.5 text-emerald-400 cursor-pointer";
            lockIcon.className = "fa-solid fa-lock-open";
            lockStatusText.innerText = "Authorized";

            dropZone.classList.remove('disabled-zone');
            dropZone.classList.add('cursor-pointer');
            fileInput.disabled = false;
            dropZoneContent.innerHTML = `
                <div class="text-2xl text-indigo-400"><i class="fa-solid fa-images"></i></div>
                <p class="text-xs font-medium text-slate-300">Tap to select your images</p>
            `;
            renderGallery();
        });

        dropZone.addEventListener('click', () => {
            if (!isUploading && userToken !== "") fileInput.click();
            else if(userToken === "") alert("Please login first!");
        });

        fileInput.addEventListener('change', (e) => {
            if (!isUploading && userToken !== "") handleImageUpload(e.target.files);
        });

        async function handleImageUpload(files) {
            const imageFiles = Array.from(files).filter(file => 
                file.type === "image/png" || file.type === "image/jpeg" || file.type === "image/jpg"
            );
            if (imageFiles.length === 0) return;

            isUploading = true;
            dropZone.classList.add('disabled-zone');
            refreshBtn.disabled = true;
            uploadStatus.classList.remove('hidden');

            let successCount = 0;
            const totalFiles = imageFiles.length;

            for (let i = 0; i < totalFiles; i++) {
                const file = imageFiles[i];
                statusText.innerHTML = `Uploading: ${i + 1}/${totalFiles}`;

                try {
                    const base64Data = await convertToBase64(file);
                    const rawBase64 = base64Data.split(',')[1];
                    
                    const formData = new URLSearchParams();
                    formData.append('file', rawBase64);
                    formData.append('type', file.type);
                    formData.append('name', file.name);
                    formData.append('token', userToken);

                    await fetch(UPLOAD_API, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });
                    
                    successCount++;
                    const computedProgress = Math.round(((i + 1) / totalFiles) * 100);
                    progressBar.style.width = `${computedProgress}%`;
                    percentText.innerText = `${computedProgress}%`;
                } catch (error) { console.error(error); }
            }

            statusText.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400 mr-1"></i> Sync completed.`;
            setTimeout(() => {
                isUploading = false;
                uploadStatus.classList.add('hidden');
                dropZone.classList.remove('disabled-zone');
                refreshBtn.disabled = false;
                fileInput.value = ''; 
                fetchGallery(); 
            }, 2000);
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function fetchGallery() {
            emptyState.classList.remove('hidden');
            galleryGrid.innerHTML = '';
            try {
                const res = await fetch(VIEW_API);
                fetchedImages = await res.json();
                emptyState.classList.add('hidden');
                renderGallery();
            } catch (err) {
                console.error(err);
                emptyState.innerHTML = `<p class="text-xs text-rose-400">Failed to load gallery.</p>`;
            }
        }

        function renderGallery() {
            galleryGrid.innerHTML = '';
            if (!fetchedImages || fetchedImages.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = `<p class="text-xs text-slate-500">No photos inside Google Drive folder.</p>`;
                return;
            }

            fetchedImages.forEach((img, index) => {
                // TEMPLATE LITERAL STRING TYPO FIXED
                const directDriveUrl = `https://lh3.googleusercontent.com/d/${img.id}`;
                const card = document.createElement('div');
                card.className = 'glass-card relative rounded-lg overflow-hidden aspect-square shadow-sm border border-slate-800/40 group';
                
                card.innerHTML = `
                    <img src="${directDriveUrl}" class="w-full h-full object-cover cursor-pointer relative z-10" alt="${img.name}" loading="lazy">
                `;
                
                card.querySelector('img').addEventListener('click', () => openLightbox(index));
                galleryGrid.appendChild(card);
            });
        }

        function openLightbox(index) {
            activeIndex = index;
            const imgData = fetchedImages[activeIndex];
            
            currentScale = 1;
            translateX = 0;
            translateY = 0;
            zoomSlider.value = 1;
            zoomValue.innerText = "100%";
            updateImageTransform();

            lightboxImg.src = `https://lh3.googleusercontent.com/d/${imgData.id}`;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            setTimeout(() => lightbox.classList.remove('opacity-0'), 10);
        }

        function updateImageTransform() {
            lightboxImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        zoomSlider.addEventListener('input', (e) => {
            currentScale = e.target.value;
            zoomValue.innerText = Math.round(currentScale * 100) + "%";
            if(currentScale === 1 || currentScale === "1") {
                translateX = 0;
                translateY = 0;
            }
            updateImageTransform();
        });

        // DRAG LOGIC
        const startDrag = (clientX, clientY) => {
            if (currentScale > 1) {
                isDragging = true;
                startX = clientX - translateX;
                startY = clientY - translateY;
            }
        };

        const moveDrag = (clientX, clientY) => {
            if (!isDragging) return;
            translateX = clientX - startX;
            translateY = clientY - startY;
            updateImageTransform();
        };

        const stopDrag = () => { isDragging = false; };

        imgContainer.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', stopDrag);

        imgContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', stopDrag);

        closeLightbox.addEventListener('click', () => {
            lightbox.classList.add('opacity-0');
            setTimeout(() => { lightbox.classList.remove('flex'); lightbox.classList.add('hidden'); }, 300);
        });
    </script>
</body>
</html>
